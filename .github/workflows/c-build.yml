name: C Build

on:
  push:
    branches: [main]
    paths:
      - 'phases/**/*.c'
      - 'phases/**/*.h'
      - 'phases/**/Makefile'
      - 'common/c/**'
      - '.github/workflows/c-build.yml'
  pull_request:
    paths:
      - 'phases/**/*.c'
      - 'phases/**/*.h'
      - 'phases/**/Makefile'
      - 'common/c/**'

jobs:
  build:
    name: ${{ matrix.compiler }} (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        sanitizer: [none, asan]
        include:
          - compiler: gcc
            cc: gcc-13
          - compiler: clang
            cc: clang-18
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ${{ matrix.cc }} \
            libsodium-dev libssl-dev pkg-config

      - name: Build all C lessons
        env:
          CC: ${{ matrix.cc }}
          MAKEFLAGS: -j2
        run: |
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then
            export EXTRA_CFLAGS="-fsanitize=address -fno-omit-frame-pointer"
            export EXTRA_LDFLAGS="-fsanitize=address"
          fi
          make build

      - name: Run C tests
        run: make test-c

  lint:
    name: clang-format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          # Find all .c and .h files; check format; fail on diff
          find phases common/c -name '*.c' -o -name '*.h' | \
            xargs clang-format-18 --dry-run --Werror --style=file
