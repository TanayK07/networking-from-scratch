name: Build & Test Lessons

on:
  push:
    branches: [main]
    paths:
      - 'phases/**/*.c'
      - 'phases/**/*.h'
      - 'phases/**/Makefile'
      - 'common/c/**'
      - '.github/workflows/lessons.yml'
  pull_request:
    paths:
      - 'phases/**/*.c'
      - 'phases/**/*.h'
      - 'phases/**/Makefile'
      - 'common/c/**'
      - '.github/workflows/lessons.yml'

jobs:
