[tox]
envlist = py311, py312, lint, type
isolated_build = True
skipsdist = True

[testenv]
deps =
    pytest>=8
    pytest-asyncio
    scapy
    cryptography
commands = pytest -q phases common/python

[testenv:lint]
deps = ruff>=0.6
commands =
    ruff check phases tools common/python
    ruff format --check phases tools common/python

[testenv:type]
deps =
    mypy>=1.10
    types-PyYAML
commands = mypy --strict common/python tools

[pytest]
testpaths = phases common/python
asyncio_mode = auto
